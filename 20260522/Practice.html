<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>MindAR 影片播放互動</title>

    <!-- 載入 A-Frame 和 MindAR -->
    <script src="https://cdn.jsdelivr.net/npm/aframe@1.4.2/dist/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
        }

        #hint {
            position: fixed;
            left: 50%;
            bottom: 40px;
            transform: translateX(-50%);
            z-index: 999;
            padding: 12px 20px;
            background: rgba(0, 0, 0, 0.75);
            color: white;
            font-size: 16px;
            border-radius: 12px;
            font-family: Arial, sans-serif;
        }
    </style>
</head>

<body>
    <div id="hint">掃描圖片後，點一下畫面播放音樂影片</div>

    <a-scene
        mindar-image="imageTargetSrc: gem.mind; autoStart: true; uiScanning: true;"
        color-space="sRGB"
        renderer="colorManagement: true; physicallyCorrectLights: true"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false"
    >
        <a-assets>
            <video
                id="introVid"
                src="sky.mp4"
                preload="auto"
                loop
                playsinline
                webkit-playsinline>
            </video>
        </a-assets>

        <a-light type="ambient" intensity="1.5"></a-light>

        <a-camera look-controls="enabled: false"></a-camera>

        <a-entity id="target" mindar-image-target="targetIndex: 0">
            <a-video
                id="videoEntity"
                src="#introVid"
                width="0.7"
                height="1.2"
                position="0 0 0"
                material="shader: flat"
                animation="property: position; from: 0 -0.2 0; to: 0 0 0; dur: 800; easing: easeOutQuad; startEvents: targetFound">
            </a-video>
        </a-entity>
    </a-scene>

    <script>
        const video = document.querySelector('#introVid');
        const videoPlane = document.querySelector('#videoEntity');
        const targetEntity = document.querySelector('#target');
        const hint = document.querySelector('#hint');

        let targetVisible = false;

        video.muted = false;
        video.volume = 1.0;

        targetEntity.addEventListener('targetFound', () => {
            targetVisible = true;
            hint.innerText = '已掃描成功，請點一下畫面播放音樂';
            hint.style.display = 'block';
        });

        targetEntity.addEventListener('targetLost', () => {
            targetVisible = false;
            video.pause();
            video.currentTime = 0;
            hint.innerText = '請重新掃描圖片';
            hint.style.display = 'block';
        });

        document.body.addEventListener('click', () => {
            if (targetVisible) {
                video.play().then(() => {
                    hint.style.display = 'none';
                }).catch((error) => {
                    console.log('影片播放失敗：', error);
                    hint.innerText = '播放失敗，請確認影片格式是否為 MP4';
                });
            }
        });

        videoPlane.addEventListener('click', () => {
            if (video.paused) {
                video.play();
            } else {
                video.pause();
            }
        });
    </script>
</body>
</html>
